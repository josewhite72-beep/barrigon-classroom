<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tareas · Barrigón Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --bg2: #162030;
    --bg3: #1e2d40;
    --card: #1a2a3a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f4f8;
    --muted: #7a9ab8;
    --blue: #2e7de9;
    --blue-light: #5b9ef7;
    --teal: #1a9e7a;
    --teal-light: #2ecfa0;
    --amber: #d4860a;
    --amber-light: #f5a623;
    --coral: #d94f3d;
    --coral-light: #ff7b6b;
    --purple: #7c5cbf;
    --purple-light: #9b7de0;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== FONDO ===== */
  .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; animation:drift 20s ease-in-out infinite; }
  .orb1 { width:380px; height:380px; background:#2e7de9; top:-80px; right:-80px; animation-delay:0s; }
  .orb2 { width:300px; height:300px; background:#7c5cbf; bottom:-60px; left:-60px; animation-delay:-10s; }
  @keyframes drift {
    0%,100% { transform:translate(0,0) scale(1); }
    50% { transform:translate(-20px,20px) scale(1.04); }
  }

  /* ===== LAYOUT ===== */
  .container {
    position:relative; z-index:1;
    width:100%; max-width:480px;
    margin:0 auto;
    padding:0 16px 80px;
  }

  /* ===== HEADER ===== */
  .page-header {
    padding:50px 0 20px;
    display:flex; align-items:center; gap:14px;
  }
  .back-btn {
    background:var(--bg3); border:1.5px solid var(--border);
    border-radius:10px; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:18px;
    cursor:pointer; transition:all 0.2s; text-decoration:none; flex-shrink:0;
  }
  .back-btn:hover { color:var(--text); border-color:var(--muted); }
  .header-text h1 { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; }
  .header-text p { font-size:12px; color:var(--muted); margin-top:2px; }

  /* ===== ROLE BADGE ===== */
  .role-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 12px; border-radius:20px;
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
    margin-bottom:18px;
  }
  .pill-docente { background:rgba(46,125,233,0.15); border:1px solid rgba(46,125,233,0.3); color:var(--blue-light); }
  .pill-estudiante { background:rgba(26,158,122,0.15); border:1px solid rgba(26,158,122,0.3); color:var(--teal-light); }

  /* ===== FILTROS ===== */
  .filter-row {
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none; margin-bottom:16px;
  }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip {
    padding:7px 14px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:20px;
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
    color:var(--muted); cursor:pointer; transition:all 0.15s;
    white-space:nowrap; flex-shrink:0;
  }
  .filter-chip.active-blue { background:rgba(46,125,233,0.15); border-color:var(--blue-light); color:var(--blue-light); }
  .filter-chip.active-teal { background:rgba(26,158,122,0.15); border-color:var(--teal-light); color:var(--teal-light); }

  /* ===== STATS MINI ===== */
  .mini-stats {
    display:flex; gap:10px; margin-bottom:18px;
  }
  .mini-stat {
    flex:1; background:var(--card);
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    padding:12px 14px; text-align:center;
  }
  .mini-stat-num {
    font-family:'Nunito',sans-serif; font-size:22px; font-weight:900;
    display:block;
  }
  .mini-stat-label { font-size:10px; color:var(--muted); }
  .num-blue { color:var(--blue-light); }
  .num-amber { color:var(--amber-light); }
  .num-teal { color:var(--teal-light); }

  /* ===== BOTÓN NUEVA TAREA ===== */
  .btn-nueva {
    width:100%; padding:15px;
    background:linear-gradient(135deg, var(--blue), #1a5bc4);
    border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:800;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:20px;
    box-shadow:0 4px 20px rgba(46,125,233,0.3);
  }
  .btn-nueva:active { transform:scale(0.98); }

  /* ===== TARJETAS DE TAREA ===== */
  .task-list { display:flex; flex-direction:column; gap:12px; }

  .task-card {
    background:var(--card);
    border:1.5px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    animation:slideIn 0.25s ease;
    position:relative; overflow:hidden;
  }
  .task-card::before {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:3px;
    border-radius:2px 0 0 2px;
  }
  .task-card.due-ok::before   { background:var(--teal-light); }
  .task-card.due-soon::before { background:var(--amber-light); }
  .task-card.due-late::before { background:var(--coral-light); }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .task-top {
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:10px; margin-bottom:8px;
  }
  .task-title {
    font-family:'Nunito',sans-serif; font-size:15px; font-weight:800;
    line-height:1.3; flex:1;
  }
  .task-actions { display:flex; gap:6px; flex-shrink:0; }
  .btn-task-del {
    background:none; border:none; color:var(--muted);
    font-size:16px; cursor:pointer; padding:4px;
    border-radius:6px; transition:all 0.2s;
  }
  .btn-task-del:hover { color:var(--coral-light); background:rgba(217,79,61,0.1); }

  .task-desc {
    font-size:13px; color:var(--muted); line-height:1.5;
    margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .task-desc.expanded { -webkit-line-clamp:unset; }

  .task-meta {
    display:flex; flex-wrap:wrap; gap:6px; align-items:center;
  }
  .meta-chip {
    padding:3px 10px; border-radius:12px;
    font-family:'Nunito',sans-serif; font-size:11px; font-weight:700;
  }
  .chip-grade   { background:rgba(124,92,191,0.15); color:var(--purple-light); border:1px solid rgba(124,92,191,0.25); }
  .chip-subject { background:rgba(46,125,233,0.12); color:var(--blue-light); border:1px solid rgba(46,125,233,0.2); }
  .chip-due-ok   { background:rgba(26,158,122,0.12); color:var(--teal-light); border:1px solid rgba(26,158,122,0.2); }
  .chip-due-soon { background:rgba(212,134,10,0.15); color:var(--amber-light); border:1px solid rgba(212,134,10,0.25); }
  .chip-due-late { background:rgba(217,79,61,0.15); color:var(--coral-light); border:1px solid rgba(217,79,61,0.25); }

  .btn-expand {
    background:none; border:none; color:var(--muted);
    font-size:11px; font-family:'Nunito',sans-serif; font-weight:700;
    cursor:pointer; padding:0; margin-left:auto;
    transition:color 0.2s;
  }
  .btn-expand:hover { color:var(--text); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align:center; padding:52px 20px;
    display:none;
  }
  .empty-state.show { display:block; }
  .empty-icon { font-size:52px; margin-bottom:14px; }
  .empty-state h3 { font-family:'Nunito',sans-serif; font-size:17px; font-weight:800; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--muted); }

  /* ===== MODAL NUEVA TAREA ===== */
  .modal-overlay {
    position:fixed; inset:0; z-index:50;
    background:rgba(10,16,24,0.88);
    backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:24px 24px 0 0;
    padding:28px 20px 48px;
    width:100%; max-width:480px;
    transform:translateY(40px);
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height:92vh; overflow-y:auto;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 22px; }
  .modal h3 { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; margin-bottom:20px; }

  .field { margin-bottom:16px; }
  .field label {
    display:block; font-size:11px; font-weight:700;
    color:var(--muted); letter-spacing:0.8px; text-transform:uppercase;
    margin-bottom:7px; font-family:'Nunito',sans-serif;
  }
  .field input, .field select, .field textarea {
    width:100%; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:var(--radius-sm);
    padding:13px 16px; color:var(--text);
    font-size:15px; font-family:'Nunito Sans',sans-serif;
    outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--blue); }
  .field select option { background:var(--bg3); }
  .field textarea { resize:none; height:90px; line-height:1.5; }

  .field-row { display:flex; gap:10px; }
  .field-row .field { flex:1; }

  .char-count { font-size:10px; color:var(--muted); text-align:right; margin-top:4px; }

  .error-msg {
    background:rgba(217,79,61,0.15); border:1px solid rgba(217,79,61,0.3);
    border-radius:var(--radius-sm); padding:10px 14px;
    font-size:12px; color:var(--coral-light);
    margin-bottom:12px; display:none;
  }
  .error-msg.show { display:block; }

  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel {
    flex:1; padding:14px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:var(--radius-sm);
    color:var(--muted); font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .btn-save {
    flex:2; padding:14px;
    background:linear-gradient(135deg, var(--blue), #1a5bc4);
    border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:800; cursor:pointer; transition:all 0.2s;
    box-shadow:0 4px 16px rgba(46,125,233,0.3);
  }
  .btn-save:active, .btn-cancel:active { transform:scale(0.97); }
  .btn-save:disabled { opacity:0.5; cursor:not-allowed; box-shadow:none; }

  /* ===== CONFIRM DELETE ===== */
  .confirm-overlay {
    position:fixed; inset:0; z-index:60;
    background:rgba(10,16,24,0.88); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .confirm-overlay.open { opacity:1; pointer-events:all; }
  .confirm-box {
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:24px 20px;
    width:100%; max-width:320px; text-align:center;
    transform:scale(0.9); transition:transform 0.2s;
  }
  .confirm-overlay.open .confirm-box { transform:scale(1); }
  .confirm-box p { font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; margin-bottom:5px; }
  .confirm-box span { font-size:12px; color:var(--muted); }
  .confirm-actions { display:flex; gap:10px; margin-top:18px; }
  .btn-conf-cancel {
    flex:1; padding:12px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:var(--radius-sm);
    color:var(--muted); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-conf-del {
    flex:1; padding:12px;
    background:rgba(217,79,61,0.2); border:1.5px solid rgba(217,79,61,0.4);
    border-radius:var(--radius-sm); color:var(--coral-light);
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; cursor:pointer;
  }

  /* ===== TOAST / LOADING ===== */
  .loading-overlay {
    position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    transition:opacity 0.4s;
  }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .spinner {
    width:40px; height:40px; border:3px solid var(--border);
    border-top-color:var(--blue); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-overlay p { color:var(--muted); font-size:14px; }

  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:12px; padding:12px 20px;
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
    white-space:nowrap; z-index:200; opacity:0; transition:all 0.3s; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(26,158,122,0.4); color:var(--teal-light); }
  .toast.error   { border-color:rgba(217,79,61,0.4); color:var(--coral-light); }

  /* ===== ANIMACIONES ===== */

  /* Fade-in al cargar página */
  .container {
    animation: pageFadeIn 0.4s ease both;
  }
  @keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header — slide desde arriba */
  .page-header {
    animation: slideFromTop 0.4s cubic-bezier(0.34,1.2,0.64,1) 0.05s both;
  }
  @keyframes slideFromTop {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Float idle para cards */
  @keyframes cardFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-5px); }
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(18px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Botones primarios — micro bounce */
  .btn-primary, .btn-nueva, .btn-publicar, .btn-agregar,
  .btn-save, .btn-save-amber, .btn-save-coral, .btn-import-confirm,
  .btn-new, .btn-import {
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease !important;
  }
  .btn-primary:active, .btn-nueva:active, .btn-publicar:active,
  .btn-agregar:active, .btn-save:active, .btn-save-amber:active,
  .btn-save-coral:active, .btn-import-confirm:active,
  .btn-new:active, .btn-import:active {
    transform: scale(0.96) !important;
  }

  /* Tabs — transición suave */
  .periodo-tab, .main-tab, .filter-chip, .grade-chip {
    transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1) !important;
  }
  .periodo-tab:active, .main-tab:active,
  .filter-chip:active, .grade-chip:active {
    transform: scale(0.95);
  }

  /* Modales — slide desde abajo más fluido */
  .modal {
    transition: transform 0.35s cubic-bezier(0.34,1.3,0.64,1) !important;
  }

  /* Back button bounce */
  .back-btn {
    transition: all 0.2s cubic-bezier(0.34,1.4,0.64,1) !important;
  }
  .back-btn:active { transform: scale(0.9) !important; }

  /* Orbs más fluidos */
  .orb1 { animation: drift1 18s ease-in-out infinite !important; }
  .orb2 { animation: drift2 22s ease-in-out infinite !important; }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    25%  { transform: translate(40px,-30px) scale(1.08); }
    50%  { transform: translate(20px,40px) scale(0.92); }
    75%  { transform: translate(-30px,10px) scale(1.04); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%  { transform: translate(-40px,30px) scale(1.1); }
    66%  { transform: translate(30px,-20px) scale(0.9); }
  }

  /* Task cards */
  .task-card {
    animation: cardReveal 0.35s ease both, cardFloat 5s ease-in-out 0.35s infinite;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .task-card:nth-child(1) { animation-delay: 0.05s, 0.4s; }
  .task-card:nth-child(2) { animation-delay: 0.10s, 0.45s; }
  .task-card:nth-child(3) { animation-delay: 0.15s, 0.50s; }
  .task-card:nth-child(4) { animation-delay: 0.20s, 0.55s; }
  .task-card:nth-child(5) { animation-delay: 0.25s, 0.60s; }
  .task-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.25);
    animation-play-state: paused, paused;
  }
  /* Mini stats */
  .mini-stat {
    animation: cardReveal 0.35s ease both;
  }
  .mini-stat:nth-child(1) { animation-delay: 0.05s; }
  .mini-stat:nth-child(2) { animation-delay: 0.10s; }
  .mini-stat:nth-child(3) { animation-delay: 0.15s; }

</style>
</head>
<body>

<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingMsg">Cargando tareas...</p>
</div>

<div class="toast" id="toast"></div>

<!-- ===== MODAL NUEVA TAREA ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📝 Nueva tarea</h3>
    <div class="error-msg" id="formError"></div>

    <div class="field">
      <label>Título</label>
      <input type="text" id="inTitle" placeholder="Ej: Lectura páginas 12–15" maxlength="80"
        oninput="document.getElementById('titleCount').textContent=this.value.length+'/80'">
      <div class="char-count" id="titleCount">0/80</div>
    </div>

    <div class="field">
      <label>Descripción / Instrucciones</label>
      <textarea id="inDesc" placeholder="Explica qué deben hacer los estudiantes..." maxlength="500"
        oninput="document.getElementById('descCount').textContent=this.value.length+'/500'"></textarea>
      <div class="char-count" id="descCount">0/500</div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Grado</label>
        <select id="inGrade">
          <!-- Se llena dinámicamente en applySession según grades del docente -->
        </select>
      </div>
      <div class="field">
        <label>Materia</label>
        <select id="inSubject">
          <option value="">-- Materia --</option>
          <option value="Inglés">Inglés</option>
          <option value="Español">Español</option>
          <option value="Matemáticas">Matemáticas</option>
          <option value="Ciencias">Ciencias Naturales</option>
          <option value="Sociales">Ciencias Sociales</option>
          <option value="Arte">Arte</option>
          <option value="Ed. Física">Ed. Física</option>
          <option value="Religión">Religión</option>
          <option value="General">General</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Fecha límite</label>
      <input type="date" id="inDue">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveTask()">Publicar tarea</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM DELETE ===== -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div style="font-size:36px;margin-bottom:12px;">🗑️</div>
    <p>¿Eliminar esta tarea?</p>
    <span id="confirmTaskTitle">—</span>
    <div class="confirm-actions">
      <button class="btn-conf-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-conf-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<!-- ===== CONTENIDO ===== -->
<div class="container">
  <div class="page-header">
    <a class="back-btn" href="index.html">←</a>
    <div class="header-text">
      <h1 id="pageTitle">📝 Tareas</h1>
      <p id="pageSubtitle">CEBG Barrigón</p>
    </div>
  </div>

  <div id="rolePill"></div>

  <!-- Stats -->
  <div class="mini-stats">
    <div class="mini-stat">
      <span class="mini-stat-num num-blue" id="statTotal">—</span>
      <div class="mini-stat-label">Total</div>
    </div>
    <div class="mini-stat">
      <span class="mini-stat-num num-amber" id="statPending">—</span>
      <div class="mini-stat-label">Próx. vencer</div>
    </div>
    <div class="mini-stat">
      <span class="mini-stat-num num-teal" id="statRecent">—</span>
      <div class="mini-stat-label">Esta semana</div>
    </div>
  </div>

  <!-- Filtros de materia -->
  <div class="filter-row" id="filterRow">
    <div class="filter-chip active-blue" onclick="filterSubject(this,'all')">Todas</div>
    <div class="filter-chip" onclick="filterSubject(this,'Inglés')">Inglés</div>
    <div class="filter-chip" onclick="filterSubject(this,'Español')">Español</div>
    <div class="filter-chip" onclick="filterSubject(this,'Matemáticas')">Matemáticas</div>
    <div class="filter-chip" onclick="filterSubject(this,'Ciencias')">Ciencias</div>
    <div class="filter-chip" onclick="filterSubject(this,'Sociales')">Sociales</div>
    <div class="filter-chip" onclick="filterSubject(this,'Arte')">Arte</div>
    <div class="filter-chip" onclick="filterSubject(this,'Ed. Física')">Ed. Física</div>
  </div>

  <!-- Botón nueva tarea (solo docente) -->
  <button class="btn-nueva" id="btnNueva" style="display:none" onclick="openModal()">
    ＋ Nueva tarea
  </button>

  <!-- Lista -->
  <div class="task-list" id="taskList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📭</div>
    <h3 id="emptyTitle">Sin tareas aún</h3>
    <p id="emptyMsg">Las tareas publicadas aparecerán aquí</p>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, getDocs, doc, query, where, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJZFP_BZa5YR4GqDqYi938I15FxkUFsjE",
    authDomain: "barrigon-classroom.firebaseapp.com",
    projectId: "barrigon-classroom",
    storageBucket: "barrigon-classroom.firebasestorage.app",
    messagingSenderId: "987121913715",
    appId: "1:987121913715:web:4d61a24e8facf6766bff06"
  };
  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  // Asignar ANTES del load para garantizar disponibilidad
  window._db         = db;
  window._auth       = auth;
  window._collection = collection;
  window._addDoc     = addDoc;
  window._deleteDoc  = deleteDoc;
  window._getDocs    = getDocs;
  window._doc        = doc;
  window._query      = query;
  window._where      = where;
  window._orderBy    = orderBy;

  // Iniciar app cuando DOM esté listo
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPage);
  } else {
    initPage();
  }
</script>

<script>
  // ===== ESTADO =====
  let SESSION = null;   // {role, name, grade, uid}
  let allTasks = [];
  let currentSubject = 'all';
  let deleteTargetId = null;

  const GRADE_LABELS = {
    prek:'PreK', kinder:'Kinder',
    '1ro':'1°','2do':'2°','3ro':'3°','4to':'4°','5to':'5°','6to':'6°', all:'Todos'
  };

  // ===== INIT =====
  function initPage() {
    // Leer sesión del sessionStorage (guardada por barrigon-classroom.html al navegar)
    try { SESSION = JSON.parse(sessionStorage.getItem('bc_session') || 'null'); } catch(e) {}

    if (!SESSION) {
      // Modo demo/prueba: preguntar rol
      SESSION = promptSession();
    }

    applySession();
    loadTasks();
  }

  function promptSession() {
    // Fallback si no hay sesión — usar parámetros URL
    const params = new URLSearchParams(location.search);
    return {
      role:  params.get('rol')   || 'docente',
      name:  params.get('name')  || 'Docente',
      grade: params.get('grade') || null,
      uid:   params.get('uid')   || 'demo'
    };
  }

  function applySession() {
    const r = SESSION.role;
    const grades = SESSION.grades || [];

    document.getElementById('pageTitle').textContent =
      r === 'estudiante' ? '📚 Mis tareas' : '📝 Tareas';
    document.getElementById('pageSubtitle').textContent =
      SESSION.name + (SESSION.grade ? ' · ' + (GRADE_LABELS[SESSION.grade]||SESSION.grade) : '');

    document.getElementById('rolePill').innerHTML = r === 'docente'
      ? `<div class="role-pill pill-docente">👩‍🏫 Docente</div>`
      : r === 'director'
        ? `<div class="role-pill pill-docente">👨‍💼 Director</div>`
        : `<div class="role-pill pill-estudiante">🎒 Estudiante</div>`;

    if (r === 'docente' || r === 'director') {
      document.getElementById('btnNueva').style.display = 'flex';

      // Poblar selector de grado según grades del docente
      const sel = document.getElementById('inGrade');
      const gradeOpts = r === 'director'
        ? ['prek','kinder','1ro','2do','3ro','4to','5to','6to']
        : (grades.length ? grades : ['prek','kinder','1ro','2do','3ro','4to','5to','6to']);

      sel.innerHTML = '<option value="">-- Grado --</option>' +
        gradeOpts.map(g => `<option value="${g}">${GRADE_LABELS[g]||g}</option>`).join('') +
        '<option value="all">Todos los grados</option>';

      // Si solo tiene un grado → precargarlo
      if (gradeOpts.length === 1) {
        sel.value = gradeOpts[0];
      }
    }

    // Fecha mínima hoy para el datepicker
    document.getElementById('inDue').min = new Date().toISOString().split('T')[0];
  }

  // ===== CARGAR TAREAS =====
  async function loadTasks() {
    try {
      const role   = SESSION.role;
      const grades = SESSION.grades || [];

      if (role === 'estudiante' || role === 'padre') {
        // Solo tareas de su grado (o "all")
        const snap1 = await window._getDocs(window._query(
          window._collection(window._db, 'tasks'),
          window._where('grade', '==', SESSION.grade)
        ));
        const snap2 = await window._getDocs(window._query(
          window._collection(window._db, 'tasks'),
          window._where('grade', '==', 'all')
        ));
        allTasks = [...snap1.docs, ...snap2.docs].map(d => ({ id: d.id, ...d.data() }));

      } else if (role === 'director') {
        // Director ve todas
        const snap = await window._getDocs(window._collection(window._db, 'tasks'));
        allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      } else {
        // Docente: carga tareas de sus grados
        const snap = await window._getDocs(window._collection(window._db, 'tasks'));
        const todas = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        if (grades.length > 0) {
          // Mostrar tareas de sus grados O creadas por él O para "all"
          allTasks = todas.filter(t =>
            grades.includes(t.grade) ||
            t.grade === 'all' ||
            t.createdBy === SESSION.uid
          );
        } else {
          // Sin grades en sesión → solo las suyas
          allTasks = todas.filter(t => t.createdBy === SESSION.uid);
        }
      }

      allTasks.sort((a,b) => (a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
      renderTasks();
    } catch(e) {
      showToast('Error al cargar tareas.', 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  // ===== RENDER =====
  function renderTasks() {
    const list   = document.getElementById('taskList');
    const empty  = document.getElementById('emptyState');
    const today  = new Date(); today.setHours(0,0,0,0);
    const soon   = new Date(today); soon.setDate(today.getDate() + 3);
    const weekEnd= new Date(today); weekEnd.setDate(today.getDate() + 7);

    const filtered = currentSubject === 'all'
      ? allTasks
      : allTasks.filter(t => t.subject === currentSubject);

    // Stats
    const pendingCount = allTasks.filter(t => {
      if (!t.dueDate) return false;
      const d = new Date(t.dueDate + 'T23:59:59');
      return d >= today && d <= soon;
    }).length;
    const weekCount = allTasks.filter(t => {
      if (!t.dueDate) return false;
      const d = new Date(t.dueDate + 'T23:59:59');
      return d >= today && d <= weekEnd;
    }).length;

    document.getElementById('statTotal').textContent   = allTasks.length;
    document.getElementById('statPending').textContent = pendingCount;
    document.getElementById('statRecent').textContent  = weekCount;

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      document.getElementById('emptyTitle').textContent =
        currentSubject === 'all' ? 'Sin tareas aún' : 'Sin tareas de ' + currentSubject;
      document.getElementById('emptyMsg').textContent =
        SESSION.role === 'docente' || SESSION.role === 'director'
          ? 'Publica la primera tarea con el botón de arriba'
          : 'El docente publicará las tareas aquí';
      return;
    }
    empty.classList.remove('show');

    list.innerHTML = filtered.map(t => {
      const dueClass = getDueClass(t.dueDate);
      const dueLabel = getDueLabel(t.dueDate);
      const chipDue  = dueClass === 'due-ok'   ? 'chip-due-ok'
                     : dueClass === 'due-soon'  ? 'chip-due-soon' : 'chip-due-late';

      const canDelete = SESSION.role === 'director' ||
        (SESSION.role === 'docente' && (t.createdBy === SESSION.uid || SESSION.uid === 'demo'));

      return `
      <div class="task-card ${dueClass}" id="tc-${t.id}">
        <div class="task-top">
          <div class="task-title">${escHtml(t.title)}</div>
          ${canDelete ? `<div class="task-actions">
            <button class="btn-task-del" data-id="${t.id}" data-title="${escHtml(t.title)}" onclick="askDeleteBtn(this)" title="Eliminar">🗑️</button>
          </div>` : ''}
        </div>
        ${t.description ? `<div class="task-desc" id="desc-${t.id}">${escHtml(t.description)}
          </div>` : ''}
        <div class="task-meta">
          ${t.grade ? `<span class="meta-chip chip-grade">${GRADE_LABELS[t.grade]||t.grade}</span>` : ''}
          ${t.subject ? `<span class="meta-chip chip-subject">${escHtml(t.subject)}</span>` : ''}
          ${t.dueDate ? `<span class="meta-chip ${chipDue}">${dueLabel}</span>` : ''}
          ${t.description && t.description.length > 80
            ? `<button class="btn-expand" onclick="toggleDesc('${t.id}')">ver más</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ===== FECHA HELPERS =====
  function getDueClass(dueDate) {
    if (!dueDate) return 'due-ok';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dueDate + 'T23:59:59');
    const diff = Math.ceil((d - today) / (1000*60*60*24));
    if (diff < 0)  return 'due-late';
    if (diff <= 3) return 'due-soon';
    return 'due-ok';
  }

  function getDueLabel(dueDate) {
    if (!dueDate) return 'Sin fecha';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dueDate + 'T23:59:59');
    const diff = Math.ceil((d - today) / (1000*60*60*24));
    if (diff < 0)  return 'Venció hace ' + Math.abs(diff) + 'd';
    if (diff === 0) return '⚠️ Vence hoy';
    if (diff === 1) return '⚡ Mañana';
    if (diff <= 3)  return '⏰ En ' + diff + ' días';
    // Formato legible
    const [y,m,day] = dueDate.split('-');
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `📅 ${day} ${meses[parseInt(m)-1]}`;
  }

  // ===== EXPAND DESC =====
  function toggleDesc(id) {
    const el  = document.getElementById('desc-'+id);
    const btn = el?.nextElementSibling?.querySelector?.('.btn-expand') ||
                el?.parentElement?.querySelector?.('.btn-expand');
    if (!el) return;
    el.classList.toggle('expanded');
    // buscar el botón en task-meta
    const taskCard = document.getElementById('tc-'+id);
    const expBtn = taskCard?.querySelector('.btn-expand');
    if (expBtn) expBtn.textContent = el.classList.contains('expanded') ? 'ver menos' : 'ver más';
  }

  // ===== FILTRO =====
  function filterSubject(el, subject) {
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.remove('active-blue','active-teal');
    });
    el.classList.add('active-blue');
    currentSubject = subject;
    renderTasks();
  }

  // ===== MODAL NUEVA TAREA =====
  function openModal() {
    document.getElementById('inTitle').value   = '';
    document.getElementById('inDesc').value    = '';
    document.getElementById('inGrade').value   = '';
    document.getElementById('inSubject').value = '';
    document.getElementById('inDue').value     = '';
    document.getElementById('titleCount').textContent = '0/80';
    document.getElementById('descCount').textContent  = '0/500';
    document.getElementById('formError').classList.remove('show');
    document.getElementById('btnSave').disabled = false;
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inTitle').focus(), 350);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ===== GUARDAR TAREA =====
  async function saveTask() {
    const title   = document.getElementById('inTitle').value.trim();
    const desc    = document.getElementById('inDesc').value.trim();
    const grade   = document.getElementById('inGrade').value;
    const subject = document.getElementById('inSubject').value;
    const due     = document.getElementById('inDue').value;
    const err     = document.getElementById('formError');
    err.classList.remove('show');

    if (!title)   { err.textContent='Escribe un título para la tarea.'; err.classList.add('show'); return; }
    if (!grade)   { err.textContent='Selecciona el grado.'; err.classList.add('show'); return; }
    if (!subject) { err.textContent='Selecciona la materia.'; err.classList.add('show'); return; }

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = 'Publicando...';

    try {
      const data = {
        title, grade, subject,
        description: desc || '',
        dueDate: due || null,
        createdBy: SESSION.uid,
        createdByName: SESSION.name,
        createdAt: new Date().toISOString()
      };
      const ref = await window._addDoc(window._collection(window._db, 'tasks'), data);
      allTasks.unshift({ id: ref.id, ...data });
      allTasks.sort((a,b) => (a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
      closeModal();
      renderTasks();
      showToast('✅ Tarea publicada', 'success');
    } catch(e) {
      err.textContent = 'Error al guardar. Verifica conexión.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Publicar tarea';
    }
  }

  // ===== ELIMINAR =====
  function askDeleteBtn(btn) {
    const id    = btn.getAttribute('data-id');
    const title = btn.getAttribute('data-title');
    askDelete(id, title);
  }

  function askDelete(id, title) {
    deleteTargetId = id;
    document.getElementById('confirmTaskTitle').textContent = title;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  function closeConfirm() {
    deleteTargetId = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  }
  async function confirmDelete() {
    if (!deleteTargetId) return;
    if (!window._deleteDoc || !window._doc || !window._db) {
      showToast('Error: Firebase no inicializado. Recarga la página.', 'error');
      return;
    }
    closeConfirm();
    try {
      const docRef = window._doc(window._db, 'tasks', deleteTargetId);
      await window._deleteDoc(docRef);
      allTasks = allTasks.filter(t => t.id !== deleteTargetId);
      deleteTargetId = null;
      renderTasks();
      showToast('🗑️ Tarea eliminada', 'success');
    } catch(e) {
      showToast('Error: ' + (e.code || e.message || JSON.stringify(e)), 'error');
    }
  }

  // ===== TOAST =====
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3200);
  }

  // ===== UTILS =====
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
