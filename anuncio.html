<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Anuncios · Barrigón Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1923; --bg2:#162030; --bg3:#1e2d40; --card:#1a2a3a;
    --border:rgba(255,255,255,0.08); --text:#f0f4f8; --muted:#7a9ab8;
    --blue:#2e7de9; --blue-light:#5b9ef7;
    --teal:#1a9e7a; --teal-light:#2ecfa0;
    --amber:#d4860a; --amber-light:#f5a623;
    --coral:#d94f3d; --coral-light:#ff7b6b;
    --purple:#7c5cbf; --purple-light:#9b7de0;
    --radius:16px; --radius-sm:10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.11; animation:drift 22s ease-in-out infinite; }
  .orb1 { width:340px; height:340px; background:#7c5cbf; top:-80px; left:-60px; animation-delay:0s; }
  .orb2 { width:260px; height:260px; background:#2e7de9; bottom:-50px; right:-40px; animation-delay:-11s; }
  @keyframes drift { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(20px,-15px) scale(1.04);} }

  .container { position:relative; z-index:1; width:100%; max-width:480px; margin:0 auto; padding:0 16px 80px; }

  /* HEADER */
  .page-header { padding:50px 0 20px; display:flex; align-items:center; gap:14px; }
  .back-btn {
    background:var(--bg3); border:1.5px solid var(--border); border-radius:10px;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:18px; cursor:pointer; text-decoration:none; flex-shrink:0; transition:all 0.2s;
  }
  .back-btn:hover { color:var(--text); border-color:var(--muted); }
  .header-text h1 { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; }
  .header-text p { font-size:12px; color:var(--muted); margin-top:2px; }

  /* FILTROS */
  .filter-row {
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none; margin-bottom:18px;
  }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip {
    padding:7px 14px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:20px;
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
    color:var(--muted); cursor:pointer; transition:all 0.15s;
    white-space:nowrap; flex-shrink:0;
  }
  .filter-chip.sel { background:rgba(124,92,191,0.15); border-color:var(--purple-light); color:var(--purple-light); }

  /* BOTÓN PUBLICAR */
  .btn-publicar {
    width:100%; padding:15px;
    background:linear-gradient(135deg, var(--purple), #5a3d99);
    border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:800;
    cursor:pointer; transition:all 0.2s;
    display:none; align-items:center; justify-content:center; gap:8px;
    margin-bottom:20px;
    box-shadow:0 4px 20px rgba(124,92,191,0.3);
  }
  .btn-publicar.visible { display:flex; }
  .btn-publicar:active { transform:scale(0.98); }

  /* TARJETAS ANUNCIO */
  .announce-list { display:flex; flex-direction:column; gap:12px; }

  .announce-card {
    background:var(--card); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:18px;
    animation:slideIn 0.25s ease; position:relative; overflow:hidden;
  }
  .announce-card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    border-radius:2px;
  }
  .ann-global::after  { background:linear-gradient(90deg, var(--purple-light), var(--blue-light)); }
  .ann-grado::after   { background:linear-gradient(90deg, var(--teal-light), var(--blue-light)); }
  .ann-urgente::after { background:linear-gradient(90deg, var(--coral-light), var(--amber-light)); }

  @keyframes slideIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  .ann-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
  .ann-avatar {
    width:38px; height:38px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .ann-avatar.av-global  { background:rgba(124,92,191,0.2); }
  .ann-avatar.av-grado   { background:rgba(26,158,122,0.2); }
  .ann-avatar.av-urgente { background:rgba(217,79,61,0.2); }

  .ann-meta { flex:1; min-width:0; }
  .ann-author { font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; }
  .ann-time   { font-size:11px; color:var(--muted); margin-top:1px; }

  .ann-actions { display:flex; gap:6px; flex-shrink:0; }
  .btn-ann-del {
    background:none; border:none; color:var(--muted); font-size:16px;
    cursor:pointer; padding:4px; border-radius:6px; transition:all 0.2s;
  }
  .btn-ann-del:hover { color:var(--coral-light); background:rgba(217,79,61,0.1); }

  .ann-body {
    font-size:14px; line-height:1.6; color:var(--text);
    margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .ann-body.expanded { -webkit-line-clamp:unset; }

  .ann-footer { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .ann-tag {
    padding:3px 10px; border-radius:12px;
    font-family:'Nunito',sans-serif; font-size:11px; font-weight:700;
  }
  .tag-global  { background:rgba(124,92,191,0.15); color:var(--purple-light); border:1px solid rgba(124,92,191,0.25); }
  .tag-grado   { background:rgba(26,158,122,0.12); color:var(--teal-light); border:1px solid rgba(26,158,122,0.2); }
  .tag-urgente { background:rgba(217,79,61,0.15); color:var(--coral-light); border:1px solid rgba(217,79,61,0.25); }
  .btn-expand-ann {
    background:none; border:none; color:var(--muted);
    font-size:11px; font-family:'Nunito',sans-serif; font-weight:700;
    cursor:pointer; padding:0; margin-left:auto; transition:color 0.2s;
  }
  .btn-expand-ann:hover { color:var(--text); }

  /* EMPTY */
  .empty-state { text-align:center; padding:52px 20px; display:none; }
  .empty-state.show { display:block; }
  .empty-icon { font-size:52px; margin-bottom:14px; }
  .empty-state h3 { font-family:'Nunito',sans-serif; font-size:17px; font-weight:800; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--muted); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; z-index:50;
    background:rgba(10,16,24,0.88); backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:24px 24px 0 0; padding:28px 20px 48px;
    width:100%; max-width:480px;
    transform:translateY(40px);
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height:92vh; overflow-y:auto;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 22px; }
  .modal h3 { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; margin-bottom:20px; }

  .field { margin-bottom:16px; }
  .field label {
    display:block; font-size:11px; font-weight:700; color:var(--muted);
    letter-spacing:0.8px; text-transform:uppercase; margin-bottom:7px; font-family:'Nunito',sans-serif;
  }
  .field select, .field textarea {
    width:100%; background:var(--bg3); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); padding:13px 16px; color:var(--text);
    font-size:15px; font-family:'Nunito Sans',sans-serif;
    outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .field select:focus, .field textarea:focus { border-color:var(--purple); }
  .field select option { background:var(--bg3); }
  .field textarea { resize:none; height:110px; line-height:1.55; }
  .char-count { font-size:10px; color:var(--muted); text-align:right; margin-top:4px; }

  /* Tipo de anuncio radio-chips */
  .type-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .type-chip {
    padding:8px 14px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:20px;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
    color:var(--muted); cursor:pointer; transition:all 0.15s; flex-shrink:0;
  }
  .type-chip.sel-global  { background:rgba(124,92,191,0.15); border-color:var(--purple-light); color:var(--purple-light); }
  .type-chip.sel-grado   { background:rgba(26,158,122,0.15); border-color:var(--teal-light); color:var(--teal-light); }
  .type-chip.sel-urgente { background:rgba(217,79,61,0.15); border-color:var(--coral-light); color:var(--coral-light); }

  .error-msg {
    background:rgba(217,79,61,0.15); border:1px solid rgba(217,79,61,0.3);
    border-radius:var(--radius-sm); padding:10px 14px;
    font-size:12px; color:var(--coral-light); margin-bottom:12px; display:none;
  }
  .error-msg.show { display:block; }

  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel {
    flex:1; padding:14px; background:var(--bg3); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--muted); font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .btn-save {
    flex:2; padding:14px; background:linear-gradient(135deg,var(--purple),#5a3d99);
    border:none; border-radius:var(--radius-sm); color:#fff;
    font-family:'Nunito',sans-serif; font-size:15px; font-weight:800;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(124,92,191,0.3);
  }
  .btn-save:disabled { opacity:0.5; cursor:not-allowed; box-shadow:none; }
  .btn-save:not(:disabled):active, .btn-cancel:active { transform:scale(0.97); }

  /* CONFIRM */
  .confirm-overlay {
    position:fixed; inset:0; z-index:60;
    background:rgba(10,16,24,0.88); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .confirm-overlay.open { opacity:1; pointer-events:all; }
  .confirm-box {
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:24px 20px;
    width:100%; max-width:320px; text-align:center;
    transform:scale(0.9); transition:transform 0.2s;
  }
  .confirm-overlay.open .confirm-box { transform:scale(1); }
  .confirm-box p { font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; margin-bottom:5px; }
  .confirm-box span { font-size:12px; color:var(--muted); }
  .confirm-actions { display:flex; gap:10px; margin-top:18px; }
  .btn-conf-cancel {
    flex:1; padding:12px; background:var(--bg3); border:1.5px solid var(--border);
    border-radius:var(--radius-sm); color:var(--muted);
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-conf-del {
    flex:1; padding:12px; background:rgba(217,79,61,0.2);
    border:1.5px solid rgba(217,79,61,0.4); border-radius:var(--radius-sm);
    color:var(--coral-light); font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; cursor:pointer;
  }

  /* LOADING / TOAST */
  .loading-overlay {
    position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    transition:opacity 0.4s;
  }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--purple); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .loading-overlay p { color:var(--muted); font-size:14px; }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:12px; padding:12px 20px;
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
    white-space:nowrap; z-index:200; opacity:0; transition:all 0.3s; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(26,158,122,0.4); color:var(--teal-light); }
  .toast.error   { border-color:rgba(217,79,61,0.4); color:var(--coral-light); }

  /* ===== ANIMACIONES ===== */

  /* Fade-in al cargar página */
  .container {
    animation: pageFadeIn 0.4s ease both;
  }
  @keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header — slide desde arriba */
  .page-header {
    animation: slideFromTop 0.4s cubic-bezier(0.34,1.2,0.64,1) 0.05s both;
  }
  @keyframes slideFromTop {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Float idle para cards */
  @keyframes cardFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-5px); }
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(18px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Botones primarios — micro bounce */
  .btn-primary, .btn-nueva, .btn-publicar, .btn-agregar,
  .btn-save, .btn-save-amber, .btn-save-coral, .btn-import-confirm,
  .btn-new, .btn-import {
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease !important;
  }
  .btn-primary:active, .btn-nueva:active, .btn-publicar:active,
  .btn-agregar:active, .btn-save:active, .btn-save-amber:active,
  .btn-save-coral:active, .btn-import-confirm:active,
  .btn-new:active, .btn-import:active {
    transform: scale(0.96) !important;
  }

  /* Tabs — transición suave */
  .periodo-tab, .main-tab, .filter-chip, .grade-chip {
    transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1) !important;
  }
  .periodo-tab:active, .main-tab:active,
  .filter-chip:active, .grade-chip:active {
    transform: scale(0.95);
  }

  /* Modales — slide desde abajo más fluido */
  .modal {
    transition: transform 0.35s cubic-bezier(0.34,1.3,0.64,1) !important;
  }

  /* Back button bounce */
  .back-btn {
    transition: all 0.2s cubic-bezier(0.34,1.4,0.64,1) !important;
  }
  .back-btn:active { transform: scale(0.9) !important; }

  /* Orbs más fluidos */
  .orb1 { animation: drift1 18s ease-in-out infinite !important; }
  .orb2 { animation: drift2 22s ease-in-out infinite !important; }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0) scale(1); }
    25%  { transform: translate(40px,-30px) scale(1.08); }
    50%  { transform: translate(20px,40px) scale(0.92); }
    75%  { transform: translate(-30px,10px) scale(1.04); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0) scale(1); }
    33%  { transform: translate(-40px,30px) scale(1.1); }
    66%  { transform: translate(30px,-20px) scale(0.9); }
  }

  /* Announce cards */
  .announce-card {
    animation: cardReveal 0.35s ease both, cardFloat 5.5s ease-in-out 0.35s infinite;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .announce-card:nth-child(1) { animation-delay: 0.05s, 0.4s; }
  .announce-card:nth-child(2) { animation-delay: 0.11s, 0.46s; }
  .announce-card:nth-child(3) { animation-delay: 0.17s, 0.52s; }
  .announce-card:nth-child(4) { animation-delay: 0.23s, 0.58s; }
  .announce-card:nth-child(5) { animation-delay: 0.29s, 0.64s; }
  .announce-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.25);
    animation-play-state: paused, paused;
  }
  /* Type chips pop */
  .type-chip {
    transition: all 0.2s cubic-bezier(0.34,1.4,0.64,1) !important;
  }
  .type-chip:active { transform: scale(0.92); }

</style>
</head>
<body>

<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Cargando anuncios...</p>
</div>
<div class="toast" id="toast"></div>

<!-- MODAL NUEVO ANUNCIO -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📢 Nuevo anuncio</h3>
    <div class="error-msg" id="formError"></div>

    <div class="field">
      <label>Tipo</label>
      <div class="type-chips">
        <div class="type-chip sel-global" id="chip-global" onclick="selectType('global')">🌐 Para todos</div>
        <div class="type-chip" id="chip-grado" onclick="selectType('grado')">🎒 Por grado</div>
        <div class="type-chip" id="chip-urgente" onclick="selectType('urgente')">🚨 Urgente</div>
      </div>
    </div>

    <div class="field" id="gradeField" style="display:none">
      <label>Grado destinatario</label>
      <select id="inGrade">
        <option value="">-- Selecciona --</option>
        <option value="prek">PreK</option>
        <option value="kinder">Kinder</option>
        <option value="1ro">1° Grado</option>
        <option value="2do">2° Grado</option>
        <option value="3ro">3° Grado</option>
        <option value="4to">4° Grado</option>
        <option value="5to">5° Grado</option>
        <option value="6to">6° Grado</option>
      </select>
    </div>

    <div class="field">
      <label>Mensaje</label>
      <textarea id="inMsg" placeholder="Escribe el anuncio aquí..." maxlength="600"
        oninput="document.getElementById('msgCount').textContent=this.value.length+'/600'"></textarea>
      <div class="char-count" id="msgCount">0/600</div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveAnnounce()">Publicar</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div style="font-size:36px;margin-bottom:12px;">🗑️</div>
    <p>¿Eliminar este anuncio?</p>
    <span>Esta acción no se puede deshacer.</span>
    <div class="confirm-actions">
      <button class="btn-conf-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-conf-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">
  <div class="page-header">
    <a class="back-btn" href="index.html">←</a>
    <div class="header-text">
      <h1>📢 Anuncios</h1>
      <p id="pageSubtitle">CEBG Barrigón</p>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filter-row">
    <div class="filter-chip sel" onclick="setFilter(this,'all')">Todos</div>
    <div class="filter-chip" onclick="setFilter(this,'global')">🌐 Generales</div>
    <div class="filter-chip" onclick="setFilter(this,'urgente')">🚨 Urgentes</div>
    <div class="filter-chip" onclick="setFilter(this,'grado')">🎒 Mi grado</div>
  </div>

  <!-- Botón publicar (solo docente/director) -->
  <button class="btn-publicar" id="btnPublicar" onclick="openModal()">
    ＋ Publicar anuncio
  </button>

  <!-- Lista -->
  <div class="announce-list" id="announceList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📭</div>
    <h3>Sin anuncios</h3>
    <p>Los anuncios de la escuela aparecerán aquí</p>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, getDocs, doc, query, where, orderBy, limit }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJZFP_BZa5YR4GqDqYi938I15FxkUFsjE",
    authDomain: "barrigon-classroom.firebaseapp.com",
    projectId: "barrigon-classroom",
    storageBucket: "barrigon-classroom.firebasestorage.app",
    messagingSenderId: "987121913715",
    appId: "1:987121913715:web:4d61a24e8facf6766bff06"
  };
  const app = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  window._auth = auth;
  window._db=db; window._collection=collection; window._addDoc=addDoc;
  window._deleteDoc=deleteDoc; window._getDocs=getDocs; window._doc=doc;
  window._query=query; window._where=where; window._orderBy=orderBy; window._limit=limit;
  window.addEventListener('load', initPage);
</script>

<script>
  let SESSION = null;
  let allAnnounces = [];
  let currentFilter = 'all';
  let selectedType = 'global';
  let deleteTargetId = null;

  const GRADE_LABELS = {
    prek:'PreK', kinder:'Kinder',
    '1ro':'1°','2do':'2°','3ro':'3°','4to':'4°','5to':'5°','6to':'6°'
  };

  // ===== INIT =====
  function initPage() {
    try { SESSION = JSON.parse(sessionStorage.getItem('bc_session')||'null'); } catch(e){}
    if (!SESSION) {
      const p = new URLSearchParams(location.search);
      SESSION = { role:p.get('rol')||'estudiante', name:p.get('name')||'Usuario', grade:p.get('grade')||null, uid:p.get('uid')||'demo' };
    }
    document.getElementById('pageSubtitle').textContent = SESSION.name;

    const canPost = SESSION.role === 'docente' || SESSION.role === 'director';
    if (canPost) document.getElementById('btnPublicar').classList.add('visible');

    loadAnnounces();
  }

  // ===== CARGAR =====
  async function loadAnnounces() {
    try {
      const snap = await window._getDocs(
        window._query(window._collection(window._db,'announcements'), window._orderBy('createdAt','desc'))
      );
      allAnnounces = snap.docs.map(d => ({id:d.id,...d.data()}));

      // Para estudiantes/padres: filtrar solo globales, urgentes o de su grado
      if (SESSION.role === 'estudiante' || SESSION.role === 'padre') {
        allAnnounces = allAnnounces.filter(a =>
          a.targetGrade === 'all' || a.type === 'urgente' ||
          (SESSION.grade && a.targetGrade === SESSION.grade)
        );
      }
      renderList();
    } catch(e) {
      // Intentar sin orderBy si no hay índice creado aún
      try {
        const snap2 = await window._getDocs(window._collection(window._db,'announcements'));
        allAnnounces = snap2.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        if (SESSION.role === 'estudiante' || SESSION.role === 'padre') {
          allAnnounces = allAnnounces.filter(a =>
            a.targetGrade === 'all' || a.type === 'urgente' ||
            (SESSION.grade && a.targetGrade === SESSION.grade)
          );
        }
        renderList();
      } catch(e2) {
        showToast('Error al cargar anuncios.','error');
      }
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  // ===== RENDER =====
  function renderList() {
    const list  = document.getElementById('announceList');
    const empty = document.getElementById('emptyState');

    const filtered = allAnnounces.filter(a => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'urgente') return a.type === 'urgente';
      if (currentFilter === 'global')  return a.type === 'global';
      if (currentFilter === 'grado')   return a.type === 'grado';
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = ''; empty.classList.add('show'); return;
    }
    empty.classList.remove('show');

    const canDelete = SESSION.role === 'docente' || SESSION.role === 'director';

    list.innerHTML = filtered.map(a => {
      const type = a.type || 'global';
      const cardClass = 'announce-card ann-'+type;
      const avClass   = 'ann-avatar av-'+type;
      const icon = type==='urgente' ? '🚨' : type==='grado' ? '🎒' : '📢';
      const tagClass  = 'ann-tag tag-'+type;
      const tagLabel  = type==='urgente' ? '🚨 Urgente'
                      : type==='grado'   ? '🎒 '+(GRADE_LABELS[a.targetGrade]||a.targetGrade||'Grado')
                      : '🌐 General';
      const timeStr   = formatTime(a.createdAt);
      const long = (a.message||'').length > 160;

      return `
      <div class="${cardClass}" id="ann-${a.id}">
        <div class="ann-header">
          <div class="${avClass}">${icon}</div>
          <div class="ann-meta">
            <div class="ann-author">${escHtml(a.author||'Escuela')}</div>
            <div class="ann-time">${timeStr}</div>
          </div>
          ${canDelete ? `<div class="ann-actions">
            <button class="btn-ann-del" onclick="askDelete('${a.id}')" title="Eliminar">🗑️</button>
          </div>` : ''}
        </div>
        <div class="ann-body" id="abody-${a.id}">${escHtml(a.message||'')}</div>
        <div class="ann-footer">
          <span class="${tagClass}">${tagLabel}</span>
          ${long ? `<button class="btn-expand-ann" onclick="toggleAnn('${a.id}')">ver más</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ===== EXPAND =====
  function toggleAnn(id) {
    const body = document.getElementById('abody-'+id);
    const card = document.getElementById('ann-'+id);
    body.classList.toggle('expanded');
    const btn = card.querySelector('.btn-expand-ann');
    if (btn) btn.textContent = body.classList.contains('expanded') ? 'ver menos' : 'ver más';
  }

  // ===== FILTRO =====
  function setFilter(el, filter) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
    currentFilter = filter;
    renderList();
  }

  // ===== TIPO MODAL =====
  function selectType(type) {
    selectedType = type;
    ['global','grado','urgente'].forEach(t => {
      const c = document.getElementById('chip-'+t);
      c.className = 'type-chip' + (t===type ? ' sel-'+t : '');
    });
    document.getElementById('gradeField').style.display = type==='grado' ? 'block' : 'none';
  }

  // ===== MODAL =====
  function openModal() {
    document.getElementById('inMsg').value = '';
    document.getElementById('inGrade').value = '';
    document.getElementById('msgCount').textContent = '0/600';
    document.getElementById('formError').classList.remove('show');
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').textContent = 'Publicar';
    selectType('global');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(()=>document.getElementById('inMsg').focus(),350);
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeModalOutside(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

  // ===== GUARDAR =====
  async function saveAnnounce() {
    const msg   = document.getElementById('inMsg').value.trim();
    const grade = document.getElementById('inGrade').value;
    const err   = document.getElementById('formError');
    err.classList.remove('show');

    if (!msg) { err.textContent='Escribe el mensaje del anuncio.'; err.classList.add('show'); return; }
    if (selectedType==='grado' && !grade) { err.textContent='Selecciona el grado destinatario.'; err.classList.add('show'); return; }

    const btn = document.getElementById('btnSave');
    btn.disabled=true; btn.textContent='Publicando...';

    try {
      const data = {
        message: msg,
        type: selectedType,
        targetGrade: selectedType==='grado' ? grade : 'all',
        author: SESSION.name,
        authorRole: SESSION.role,
        createdBy: SESSION.uid,
        createdAt: new Date().toISOString()
      };
      const ref = await window._addDoc(window._collection(window._db,'announcements'), data);
      allAnnounces.unshift({id:ref.id,...data});
      closeModal();
      renderList();
      showToast('📢 Anuncio publicado','success');
    } catch(e) {
      err.textContent='Error al publicar. Verifica conexión.';
      err.classList.add('show');
      btn.disabled=false; btn.textContent='Publicar';
    }
  }

  // ===== ELIMINAR =====
  function askDelete(id) {
    deleteTargetId=id;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  function closeConfirm() { deleteTargetId=null; document.getElementById('confirmOverlay').classList.remove('open'); }
  async function confirmDelete() {
    if(!deleteTargetId) return;
    closeConfirm();
    try {
      await window._deleteDoc(window._doc(window._db,'announcements',deleteTargetId));
      allAnnounces=allAnnounces.filter(a=>a.id!==deleteTargetId);
      deleteTargetId=null;
      renderList();
      showToast('🗑️ Anuncio eliminado','success');
    } catch(e) { showToast('Error al eliminar.','error'); }
  }

  // ===== TIEMPO RELATIVO =====
  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60)   return 'Hace un momento';
    if (diff < 3600) return 'Hace ' + Math.floor(diff/60) + ' min';
    if (diff < 86400) return 'Hace ' + Math.floor(diff/3600) + 'h';
    const dias = Math.floor(diff/86400);
    if (dias === 1) return 'Ayer';
    if (dias < 7)   return 'Hace ' + dias + ' días';
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return d.getDate() + ' ' + meses[d.getMonth()];
  }

  // ===== UTILS =====
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showToast(msg, type='success') {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast show '+type;
    setTimeout(()=>t.className='toast',3200);
  }
</script>
</body>
</html>
